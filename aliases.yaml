# 法案の通称・関連キーワード辞書
# 正式名は長く一致しにくいため、審議会・シンクタンク等との紐付けはキーワードが鍵。
# キーワードは「具体語」にする（広すぎる語＝携帯電話/国際展開 等は無関係会議を拾うため避ける）。
# match: 件名に含まれる識別語 / keywords: 紐付けに使う通称・関連語
aliases:
  - match: 小型無人機
    keywords: [ドローン, 小型無人機, 無人航空機]
  - match: 携帯音声通信事業者による契約者
    keywords: [本人確認, 不正利用, 不適正利用, 利用者情報, 特殊詐欺, SIM]
  - match: 海外通信・放送・郵便事業支援機構
    keywords: [JICT, 海外通信]
  - match: 郵政民営化
    keywords: [郵便料金, 郵便局ネットワーク, ユニバーサルサービス, 日本郵政]
  - match: 郵便法
    keywords: [郵便料金, 郵便サービス]
  - match: 金融商品取引法
    keywords: [課徴金, インサイダー, 資産運用]
  - match: 防衛省設置法
    keywords: [自衛隊, 防衛力]
